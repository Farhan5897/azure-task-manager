<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Task Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #111110;
            --bg-card: #1a1a19;
            --bg-input: #161615;
            --border: #2a2a28;
            --text: #eeeeec;
            --text-muted: #a0a09b;
            --text-dim: #6b6b66;
            --accent: #e5a430;
            --accent-soft: rgba(229, 164, 48, 0.1);
            --accent-border: rgba(229, 164, 48, 0.2);
            --red: #f87171;
            --red-soft: rgba(248, 113, 113, 0.1);
            --red-border: rgba(248, 113, 113, 0.2);
            --green: #4ade80;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-muted);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }
        .auth-card h2 {
            font-size: 1.15rem;
            color: var(--text);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .error-box {
            background: var(--red-soft);
            border: 1px solid var(--red-border);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            color: var(--red);
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent-border);
        }
        .form-group input::placeholder {
            color: var(--text-dim);
        }
        .form-hint {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">task.manager</div>
            <p>Create your account to get started</p>
        </div>

        <div class="auth-card">
            <h2>Create Account</h2>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" value="{{ username or '' }}" required autofocus>
                    <div class="form-hint">At least 3 characters</div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" value="{{ email or '' }}" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                    <div class="form-hint">At least 6 characters</div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a> &middot; or <a href="/">use as guest</a>
        </div>
    </div>
</body>
</html>
